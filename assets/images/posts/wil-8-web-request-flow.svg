<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Week 8 web request flow</title>
  <desc id="desc">Browser request flow from URL input through DNS, TCP, HTTP, server processing, and response rendering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071014"/>
      <stop offset="0.55" stop-color="#102128"/>
      <stop offset="1" stop-color="#061113"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08ce7b"/>
      <stop offset="1" stop-color="#5ff4d0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10Z" fill="#5ff4d0"/>
    </marker>
  </defs>
  <rect width="1200" height="620" rx="34" fill="url(#bg)"/>
  <rect x="34" y="34" width="1132" height="552" rx="26" fill="none" stroke="#24424a" stroke-width="2"/>
  <text x="70" y="90" fill="#ffffff" font-family="Arial, sans-serif" font-size="36" font-weight="800">Web request actual flow</text>
  <text x="70" y="126" fill="#a9bac4" font-family="Arial, sans-serif" font-size="18">What happens after typing a URL in the browser</text>

  <g font-family="Arial, sans-serif">
    <g transform="translate(76 190)">
      <rect width="180" height="116" rx="22" fill="#0c1921" stroke="#284855"/>
      <circle cx="46" cy="42" r="20" fill="url(#mint)" filter="url(#glow)"/>
      <text x="78" y="40" fill="#ffffff" font-size="22" font-weight="800">Browser</text>
      <text x="24" y="78" fill="#a9bac4" font-size="16">URL input</text>
      <text x="24" y="100" fill="#a9bac4" font-size="16">https://...</text>
    </g>

    <g transform="translate(306 190)">
      <rect width="180" height="116" rx="22" fill="#0c1921" stroke="#284855"/>
      <text x="26" y="42" fill="#ffffff" font-size="22" font-weight="800">DNS lookup</text>
      <text x="26" y="78" fill="#a9bac4" font-size="16">domain name</text>
      <text x="26" y="100" fill="#a9bac4" font-size="16">to IP address</text>
    </g>

    <g transform="translate(536 190)">
      <rect width="180" height="116" rx="22" fill="#0c1921" stroke="#284855"/>
      <text x="26" y="42" fill="#ffffff" font-size="22" font-weight="800">TCP connect</text>
      <text x="26" y="78" fill="#a9bac4" font-size="16">SYN</text>
      <text x="76" y="78" fill="#a9bac4" font-size="16">SYN+ACK</text>
      <text x="26" y="100" fill="#a9bac4" font-size="16">ACK</text>
    </g>

    <g transform="translate(766 190)">
      <rect width="180" height="116" rx="22" fill="#0c1921" stroke="#284855"/>
      <text x="26" y="42" fill="#ffffff" font-size="22" font-weight="800">HTTP request</text>
      <text x="26" y="78" fill="#a9bac4" font-size="16">GET /path</text>
      <text x="26" y="100" fill="#a9bac4" font-size="16">headers</text>
    </g>

    <g transform="translate(996 190)">
      <rect width="128" height="116" rx="22" fill="#0c1921" stroke="#284855"/>
      <text x="24" y="42" fill="#ffffff" font-size="22" font-weight="800">Server</text>
      <text x="24" y="78" fill="#a9bac4" font-size="16">parse</text>
      <text x="24" y="100" fill="#a9bac4" font-size="16">respond</text>
    </g>

    <path d="M256 248H296" stroke="#5ff4d0" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M486 248H526" stroke="#5ff4d0" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M716 248H756" stroke="#5ff4d0" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M946 248H986" stroke="#5ff4d0" stroke-width="4" marker-end="url(#arrow)"/>

    <path d="M1060 326C1016 424 810 475 600 475C390 475 184 424 140 326" fill="none" stroke="#5ff4d0" stroke-width="4" marker-end="url(#arrow)" opacity="0.78"/>
    <text x="410" y="512" fill="#ffffff" font-size="24" font-weight="800">HTTP response returns: status line + headers + body</text>
    <text x="440" y="548" fill="#a9bac4" font-size="18">Browser renders HTML, CSS, JS, images, and follow-up requests</text>
  </g>
</svg>
